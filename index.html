<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0a1a3f, #08142b);
    color: #fff;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN CONTAINER */
.container {
    width: 95%;
    max-width: 420px;
    text-align: center;
}

/* HEADER */
h1 {
    font-size: 28px;
    margin-bottom: 15px;
    color: #7fd6ff;
    line-height: 1.3;
}

/* CARD */
.card {
    padding: 18px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.08);
}

.card h2 {
    font-size: 20px;
    margin-bottom: 8px;
    color: #7fd6ff;
}

.card p {
    font-size: 13px;
    margin-bottom: 10px;
}

/* LIST */
ul {
    text-align: left;
    padding-left: 15px;
}

ul li {
    font-size: 13px;
    margin: 6px 0;
}

ul li span {
    color: #7fd6ff;
    font-weight: bold;
}

/* 🌈 BUTTON */
.btn {
    display: block;
    margin-top: 15px;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(270deg,
        #ff0000, #ff7f00, #ffff00, #00ff00,
        #00ffff, #0000ff, #8b00ff);
    background-size: 1400% 1400%;
    animation: gradientMove 6s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* TRUST TEXT */
.trust {
    font-size: 11px;
    margin-top: 8px;
    color: #aaa;
}

/* POPUP */
.popup {
    position: fixed;
    bottom: 15px;
    left: 15px;
    background: #1c2e4a;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    display: none;
}

</style>

<body>

<div class="container">

<h1>Welcome To<br>Trade with Purab</h1>

        <li><span>2.</span> Entry & Exit Points</li>
        <li><span>3.</span> Risk Management</li>
        <li><span>4.</span> 24/7 Support</li>
    </ul>
</div>

<a href="https://t.me/+0CLaYYUlmQ1iMmRl" class="btn">
    Join Trade with Purab 🚀
</a>

<p class="trust">✔ Trusted by traders</p>

</div>

<div id="popup" class="popup"></div>

<script>
const names = ["Ravi", "Amit", "Rahul", "Karan", "Vikram"];

function showPopup() {
    const popup = document.getElementById("popup");
    const randomName = names[Math.floor(Math.random() * names.length)];

    popup.innerHTML = "🔔 " + randomName + " just joined!";
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 2500);
}

setInterval(showPopup, 5000);
</script>
