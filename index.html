<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade With Purab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: radial-gradient(circle at top, #0a1f44, #020b1f);
    color: white;
    text-align: center;
}

/* Container */
.container{
    padding: 25px 15px;
}

/* Profile */
.profile img{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #00c3ff;
}

/* Heading */
h1{
    font-size:26px;
    margin-top:15px;
}
h1 span{
    color:#00c3ff;
}

/* Sub */
.sub{
    font-size:14px;
    margin-top:10px;
    color:#cfcfcf;
}

/* Counter */
.counter{
    margin-top:10px;
    font-size:15px;
    color:#00c3ff;
}

/* Buttons */
.btn-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.small-btn{
    padding:10px 15px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background: rgba(0,195,255,0.08);
    font-size:13px;
}

/* Timer */
.timer{
    margin-top:20px;
    font-size:18px;
    color:#4db8ff;
    font-weight:600;
}

/* Join Button */
.join-btn{
    display:inline-block;
    margin-top:25px;
    padding:16px 30px;
    border-radius:40px;
    background: linear-gradient(90deg, #00c3ff, #007bff);
    color:white;
    font-weight:600;
    text-decoration:none;
    box-shadow:0 0 20px rgba(0,195,255,0.5);
    transition:0.3s;
}

.join-btn:hover{
    transform: scale(1.05);
}

/* Notification */
.notification{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#0a1f44;
    padding:10px 15px;
    border-radius:10px;
    font-size:13px;
    display:none;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}
</style>

<body>

<div class="container">

<div class="profile">
<img src="https://www.image2url.com/r2/default/images/1781541569954-04a3999e-fb5a-4c4d-be9b-b2a368ef8001.jpg" alt="image" />
</div>

<h1>TRADE WITH <span>PURAB</span></h1>

<div class="sub">
India's Top SEBI Analyst • Expert Calls <br>
Banknifty • Nifty • Finnifty
</div>

<div class="counter">
🔥 <span id="members">61234</span> Traders Joined
</div>

<div class="btn-row">
<div class="small-btn">BANK NIFTY</div>
<div class="small-btn">NIFTY 50</div>
<div class="small-btn">FINNIFTY</div>
<div class="small-btn">SENSEX</div>
</div>

<div class="timer">
⏳ Offer Ends In: <span id="time">05:00</span>
</div>

<a href="https://t.me/+0CLaYYUlmQ1iMmRl" class="join-btn">
Join FOR FREE 🚀
</a>

</div>

<div class="notification" id="notify"></div>

<script>

/* LIVE COUNTER */
let count = 61234;
setInterval(()=>{
    count += Math.floor(Math.random()*3);
    document.getElementById("members").innerText = count;
},3000);

/* COUNTDOWN */
let time = 300;
setInterval(()=>{
    let min = Math.floor(time/60);
    let sec = time%60;
    document.getElementById("time").innerText =
    `${min}:${sec<10?'0'+sec:sec}`;
    if(time>0) time--;
},1000);

/* FAKE JOIN NOTIFICATIONS */
let names = ["Rahul","Amit","Sneha","Priya","Rohit","Karan","Anjali"];
let notify = document.getElementById("notify");

setInterval(()=>{
    let name = names[Math.floor(Math.random()*names.length)];
    notify.innerText = `${name} just joined 🚀`;
    notify.style.display = "block";

    setTimeout(()=>{
        notify.style.display = "none";
    },3000);

},5000);

</script>

</body>
</html>
