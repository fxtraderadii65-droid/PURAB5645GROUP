<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade With Purab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at top, #0b3d2e, #02140f);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* Background particles */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image: radial-gradient(#00ffb3 1px, transparent 1px);
  background-size:30px 30px;
  opacity:0.1;
  z-index:-1;
}

/* Container */
.container{
  padding:14px 20px;
}

/* Logo Circle */
.logo-circle{
  width:100px;
  height:100px;
  margin:20px auto;
  border-radius:50%;
  background:linear-gradient(45deg,#00ffb3,#00c27a);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 40px rgba(0,255,179,0.4);
  animation: pulse 2s infinite;
}

.logo-circle img{
  width:140px;
  border-radius:50%;
}

/* Heading */
h1{
  font-size:32px;
  font-weight:800;
}

h1 span{
  color:#00ffb3;
}

/* Subtext */
.sub{
  margin-top:10px;
  color:#ccc;
  font-size:14px;
}

/* Cards */
.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
  margin-top:20px;
}

.card{
  width:120px;
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 15px rgba(0,255,179,0.4);
}

/* Stats */
.stats{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:8px;
}

.stat{
  background:rgba(255,255,255,0.05);
  padding:10px 15px;
  border-radius:10px;
  font-weight:600;
}

.stat span{
  display:block;
  font-size:22px;
  color:#00ffb3;
}

/* Join Button */
.join-btn{
  margin-top:40px;
}

.join-btn a{
  text-decoration:none;
  background:linear-gradient(45deg,#00ffb3,#00c27a);
  padding:15px 40px;
  border-radius:25px;
  color:black;
  font-weight:700;
  font-size:18px;
  display:inline-block;
  transition:0.3s;
  box-shadow:0 0 20px rgba(0,255,179,0.5);
}

.join-btn a:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px rgba(0,255,179,0.8);
}

/* Animation */
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* Fake Live Join */
.live{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#0f2e25;
  padding:10px 15px;
  border-radius:10px;
  font-size:13px;
  display:none;
  box-shadow:0 0 10px rgba(0,255,179,0.3);
}
</style>

<body>

<div class="container">

  <div class="logo-circle">
    <img src="https://i.ibb.co/qMB408vK/hqdefault-1.jpg" alt="logo">
  </div>

  <h1>TRADE WITH <span>PURAB</span></h1>

  <p class="sub">
    India's Top SEBI Analyst • 60K+ Members <br>
    Expert Calls • Banknifty • Nifty • Finnifty
  </p>

  <div class="cards">
    <div class="card">BANK NIFTY</div>
    <div class="card">NIFTY 50</div>
    <div class="card">FINNIFTY</div>
    <div class="card">SENSEX</div>
  </div>
 
  <div class="join-btn">
    <a href="https://t.me/+0CLaYYUlmQ1iMmRl" target="_blank">
      🚀 JOIN FOR FREE
    </a>
  </div>

</div>

<!-- Fake Live Join Notification -->
<div class="live" id="liveBox"></div>

<script>
const names = ["Rahul","Amit","Sneha","Vikas","Priya","Arjun","Rohit"];

setInterval(()=>{
  let name = names[Math.floor(Math.random()*names.length)];
  let box = document.getElementById("liveBox");

  box.innerText = name + " just joined 🚀";
  box.style.display = "block";

  setTimeout(()=>{
    box.style.display = "none";
  },3000);

},5000);
</script>

</body>
</html>
